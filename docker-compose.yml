version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - linkhub-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: linkhub
      POSTGRES_PASSWORD: linkhub123
      POSTGRES_DB: linkhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - linkhub-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - linkhub-network

volumes:
  postgres_data:
  redis_data:

networks:
  linkhub-network:
    driver: bridge
