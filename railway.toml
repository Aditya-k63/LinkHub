[build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[deploy]
  startCommand = "sh -c 'cd app && uvicorn main:app --host 0.0.0.0 --port $PORT'"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.envs]
    PYTHON_VERSION = "3.12"
